<main id="app-content">
    <div class="container">
        <div class="shop-hero">
            <div class="shop-tag"><i class="fas fa-bolt"></i> Official GoRepireo Store</div>
            <h1>Premium Tools &<br><em>Home Essentials.</em></h1>
            <p>Verified products from certified professionals. Everything you need for your home, delivered fast.</p>
            <div class="shop-search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="shopSearch" placeholder="Search products, tools, hardware...">
                <button onclick="window.applyFilters()">Search</button>
            </div>
        </div>

        <div class="category-nav">
            <div class="category-pill active" data-category="all" onclick="window.selectCategory('all', this)">All Categories</div>
            <div class="category-pill" data-category="Electronics" onclick="window.selectCategory('Electronics', this)">Electronics</div>
            <div class="category-pill" data-category="Plumbing" onclick="window.selectCategory('Plumbing', this)">Plumbing</div>
            <div class="category-pill" data-category="Electrical" onclick="window.selectCategory('Electrical', this)">Electrical</div>
            <div class="category-pill" data-category="Tools" onclick="window.selectCategory('Tools', this)">Tools</div>
            <div class="category-pill" data-category="Hardware" onclick="window.selectCategory('Hardware', this)">Hardware</div>
        </div>

        <div id="productGrid" class="product-grid">
            <!-- Items loaded via Supabase -->
        </div>
    </div>

    <!-- Product Details Overlay -->
    <div id="detailsOverlay" class="details-overlay" onclick="window.closeDetails(event)">
        <div class="details-modal" style="background:#0a1120; border:1px solid var(--border-gold); border-radius:24px; max-width:600px; padding:40px; position:relative;">
            <button onclick="window.hideDetails()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
            <img id="modalImage" src="" style="width:100%; border-radius:12px; margin-bottom:20px;">
            <h2 id="modalName" style="font-family:'Playfair Display'; margin-bottom:10px;">Product Name</h2>
            <div class="product-price" id="modalPrice">₹0</div>
            <p id="modalDesc" style="color:var(--text-secondary); margin-top:20px;">Detailed description will appear here.</p>
        </div>
    </div>
</main>

<script>
    (function() {
        let allItems = [];

        window.fetchItems = async function() {
            const SB = window.getSB ? window.getSB() : window.supabaseClient;
            if (!SB) {
                console.warn("[Shop] SDK not ready, retrying...");
                setTimeout(window.fetchItems, 500);
                return;
            }
            try {
                const { data, error } = await SB.from('shop_items').select('*').gt('quantity', 0);
                if (error) throw error;
                allItems = data || [];
                window.renderItems(allItems);
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('productGrid').innerHTML = `<div style="grid-column: 1/-1; padding: 100px; text-align: center;">Error loading items.</div>`;
            }
        };

        window.renderItems = function(items) {
            const grid = document.getElementById('productGrid');
            if (items.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; padding: 100px; text-align: center;">No items found.</div>`;
                return;
            }
            grid.innerHTML = items.map(item => `
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="${item.image_url || 'https://via.placeholder.com/400x300'}" class="product-image">
                    </div>
                    <div class="product-info">
                        <div class="product-company">${item.company || 'Premium'}</div>
                        <h3 class="product-name">${item.name}</h3>
                        <div class="product-price"><span>₹</span>${item.price.toLocaleString()}</div>
                        <button class="details-btn" onclick="window.showDetails('${item.id}')">View Details</button>
                    </div>
                </div>
            `).join('');
        };

        window.selectCategory = function(cat, el) {
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            window.applyFilters();
        };

        window.applyFilters = function() {
            const query = (document.getElementById('shopSearch')?.value || '').toLowerCase();
            const category = document.querySelector('.category-pill.active')?.getAttribute('data-category') || 'all';
            
            const filtered = allItems.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(query);
                const matchesCategory = category === 'all' || item.category === category;
                return matchesSearch && matchesCategory;
            });
            window.renderItems(filtered);
        };

        window.showDetails = function(id) {
            const item = allItems.find(i => i.id === id);
            if (!item) return;
            document.getElementById('modalImage').src = item.image_url || '';
            document.getElementById('modalName').innerText = item.name;
            document.getElementById('modalPrice').innerText = '₹' + item.price.toLocaleString();
            document.getElementById('modalDesc').innerText = item.description || 'Verified product.';
            document.getElementById('detailsOverlay').style.display = 'flex';
        };

        window.hideDetails = function() {
            document.getElementById('detailsOverlay').style.display = 'none';
        };

        window.closeDetails = function(e) {
            if (e.target.id === 'detailsOverlay') window.hideDetails();
        };

        window.fetchItems();
    })();
</script>
