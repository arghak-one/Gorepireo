<link rel="stylesheet" href="/src/css/responsive.css">

<style>
    :root {
        --bg-base: #050b14;
        --bg-gradient: radial-gradient(circle at 80% -10%, rgba(193,154,50,0.08) 0%, transparent 50%),
                       radial-gradient(circle at 10% 90%, rgba(193,154,50,0.04) 0%, transparent 40%);
        --text-primary: #FFFFFF;
        --text-secondary: #CBD5E1; /* Brightened from #9CA3AF */
        --accent: #C19A32;
        --accent-hover: #a8852a;
        --accent-dim: rgba(193, 154, 50, 0.15);
        --accent-border: rgba(193, 154, 50, 0.3);
        --surface: rgba(255, 255, 255, 0.05); /* Increased slightly for definition */
        --surface-glass: rgba(5, 11, 20, 0.9);
        --border-subtle: rgba(255, 255, 255, 0.12); /* Increased for better border definition */
        --border-active: rgba(193, 154, 50, 0.5);
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* --- VISIBILITY REFRESH --- */
    input::placeholder { color: #94A3B8 !important; opacity: 1 !important; }
    input:focus::placeholder { color: #CBD5E1 !important; }

    .container {
        max-width: 800px;
        margin: 40px auto 120px;
        padding: 0 24px;
    }

    .track-card {
        background: var(--surface);
        backdrop-filter: blur(24px);
        padding: 64px 48px;
        border-radius: 24px;
        text-align: center;
        margin-bottom: 48px;
        border: 1px solid var(--border-subtle);
    }

    .track-card h2 {
        font-family: 'Playfair Display', serif;
        font-size: 40px;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .input-group {
        display: flex;
        gap: 16px;
        max-width: 600px;
        margin: 0 auto;
    }

    .input-box {
        flex: 1;
        padding: 18px 28px; /* Increased padding */
        border: 1px solid var(--border-subtle);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05); /* Slightly brighter for contrast */
        color: var(--text-primary);
        outline: none;
        transition: var(--transition);
        font-size: 15px;
    }

    .input-box:focus {
        border-color: var(--accent);
        background: rgba(193, 154, 50, 0.05);
        box-shadow: 0 0 0 4px rgba(193, 154, 50, 0.1);
    }

    .btn-track {
        background: var(--accent);
        color: white;
        border: none;
        padding: 0 40px;
        border-radius: 999px;
        font-weight: 700;
        cursor: pointer;
    }

    .profile-card {
        background: var(--surface);
        padding: 40px;
        border-radius: 24px;
        display: flex;
        align-items: center;
        gap: 24px;
        margin-bottom: 32px;
        border: 1px solid var(--border-subtle);
    }

    .timeline-box {
        background: var(--surface);
        padding: 56px 48px;
        border-radius: 24px;
        border: 1px solid var(--border-subtle);
    }

    .timeline { position: relative; padding-left: 20px; }
    .timeline::before {
        content: ''; position: absolute; left: 45px; top: 10px; bottom: 50px;
        width: 2px; background: rgba(255, 255, 255, 0.05);
    }

    .step { position: relative; margin-bottom: 48px; display: flex; align-items: flex-start; }
    .step-icon {
        width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center;
        justify-content: center; margin-right: 24px; background: rgba(255, 255, 255, 0.05);
        color: var(--text-secondary); border: 4px solid #050b14; flex-shrink: 0;
    }

    .step.completed .step-icon { background: var(--accent); color: white; }
    .step.active .step-icon { border: 3px solid var(--accent); color: var(--accent); }

    @media (max-width: 768px) {
        .container { margin: 20px auto 120px; padding: 0 16px; }
        .track-card { padding: 28px 18px; margin-bottom: 24px; }
        .profile-card { padding: 20px 18px; gap: 16px; }
        .timeline-box { padding: 28px 18px; }
    }
</style>

<main id="app-content">
    <div class="container">
        <div class="track-card">
            <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(193,154,50,0.12);border:1px solid rgba(193,154,50,0.3);color:#C19A32;padding:5px 14px;border-radius:30px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;"><i class="fas fa-satellite-dish"></i> Live Tracking</div>
            <h2 data-i18n="track-title">Track Your <em style="font-style:italic;color:#C19A32;">Status</em></h2>
            <p data-i18n="track-subtitle">Enter your ID to check your application status.</p>
            <div class="input-group">
                <input type="text" id="appIdInput" class="input-box" placeholder="Example: OH-PARTNER-0001">
                <button class="btn-track" onclick="window.trackStatus()" data-i18n="track-btn">Check Status</button>
            </div>
            <div id="errorMsg" style="color:#EF4444; margin-top:20px; display:none;"><i class="fas fa-exclamation-triangle"></i> ID not found.</div>
        </div>

        <div id="resultSection" style="display:none;">
            <div class="profile-card">
                <div class="profile-icon" style="width:80px; height:80px; background:var(--accent-dim); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; color:var(--accent);"><i class="fas fa-user-check"></i></div>
                <div class="profile-details">
                    <h3 id="uName" style="font-size:28px; margin-bottom:8px;">Loading...</h3>
                    <p><strong>Service Type:</strong> <span id="uService">--</span></p>
                    <p><strong>Application ID:</strong> <span id="uAppId">--</span></p>
                </div>
            </div>

            <div class="timeline-box">
                <div class="timeline">
                    <div class="step pending" id="step1"><div class="step-icon"><i class="fas fa-file-alt"></i></div><div class="step-content"><div class="step-title">Application Received</div></div></div>
                    <div class="step pending" id="step2"><div class="step-icon"><i class="fas fa-fingerprint"></i></div><div class="step-content"><div class="step-title">Document Verification</div></div></div>
                    <div class="step pending" id="step3"><div class="step-icon"><i class="fas fa-shield-alt"></i></div><div class="step-content"><div class="step-title">Background Check</div></div></div>
                    <div class="step pending" id="step4"><div class="step-icon"><i class="fas fa-tools"></i></div><div class="step-content"><div class="step-title">Skill Test</div></div></div>
                    <div class="step pending" id="step5"><div class="step-icon"><i class="fas fa-check"></i></div><div class="step-content"><div class="step-title">Approved</div></div></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    (function() {
        window.trackStatus = async function() {
            let inputId = document.getElementById('appIdInput').value.trim();
            if (!inputId) return;

            const SB = window.getSB ? window.getSB() : window.supabaseClient;
            if (!SB) return;

            const { data: worker, error } = await SB.from('worker_applications').select('*').eq('app_id', inputId).single();

            if (worker) {
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('uName').innerText = worker.from_name;
                document.getElementById('uService').innerText = worker.service;
                document.getElementById('uAppId').innerText = worker.app_id;

                for (let i = 1; i <= 5; i++) {
                    let step = document.getElementById('step' + i);
                    step.className = 'step ' + (i < worker.status_level ? 'completed' : (i === worker.status_level ? 'active' : 'pending'));
                }
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('resultSection').style.display = 'none';
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('appId')) {
            document.getElementById('appIdInput').value = urlParams.get('appId');
            window.trackStatus();
        }
    })();
</script>
